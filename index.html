    </div>

    <div class="food">

        <img src="https://static.vecteezy.com/system/resources/previews/053/480/185/non_2x/classic-beef-cheese-burger-free-png.png">

    </div>

    <div class="food">
        <h2>🍣 Суши</h2>
        <img src="https://avatars.mds.yandex.net/i?id=c5133e302a7eac0ad3b47cfe32fce42d_l-11509297-images-thumbs&n=13">
