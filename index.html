<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Менің сүйікті тағамдарым</title>
    <style>
        body {
            font-family: Arial;
            background-color: #fff5f5;
            text-align: center;
        }
        h1 {
            color: #ff4d6d;
        }
        .food {
            background: white;
            margin: 20px auto;
            padding: 15px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>🍓 Менің сүйікті тағамдарым</h1>

    <div class="food">
        <h2>🍕 Пицца</h2>
        <img src="https://source.unsplash.com/300x200/?pizza">
        <p>Мен пиццаны өте жақсы көремін 😋</p>
    </div>

    <div class="food">
        <h2>🍔 Бургер</h2>
        <img src="https://source.unsplash.com/300x200/?burger">
        <p>Жылдам әрі дәмді тағам 🍔</p>
    </div>

    <div class="food">
        <h2>🍣 Суши</h2>
        <img src="https://source.unsplash.com/300x200/?sushi">
        <p>Жапон тағамдарын ұнатамын 🍣</p>
    </div>

</body>
</html>
